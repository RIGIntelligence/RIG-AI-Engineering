version: 2
updated_utc: "2026-05-28T14:35:00Z"
purpose: "Approved RIG AI Engineering catalog for open-source agent, harness, browser, sandbox, context, model-routing, evaluation, and observability resources."
expected_resource_count: 50

selection_policy:
  source: "GitHub primary repository metadata and root license files reviewed on 2026-05-28."
  include_only: "Resources with a clear open-source license, or an OSS/open-core surface that is marked reference-first until a deeper license review is recorded."
  install_rule: "Cataloging is not installation. Clone or run only after pinning a commit, reviewing license and security posture, sandboxing, and recording a ProofPacket."
  reference_first_if:
    - "GitHub reports NOASSERTION for the root license."
    - "The repo is AGPL, open-core, source-available, or uses mixed package licenses."
    - "The repo can control browsers, shells, credentials, accounts, or external systems."
  rejected_for_now:
    - repo: "https://github.com/Yeachan-Heo/oh-my-codex"
      reason: "No root license detected during prior review; keep as inspiration only."
    - repo: "https://github.com/code-yeongyu/oh-my-openagent"
      reason: "No root license detected during prior review; keep as inspiration only."

