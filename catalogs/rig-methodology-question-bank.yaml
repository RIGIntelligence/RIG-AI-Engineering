  - id: Q028
    persona_id: charity-majors-method
    question: "What operational feedback should flow back into product or engineering decisions?"
    evidence: "feedback loop note"
  - id: Q029
    persona_id: charity-majors-method
    question: "Who owns the service when the trace says it is broken?"
