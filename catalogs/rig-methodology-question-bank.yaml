  - id: Q022
    persona_id: charity-majors-method
    question: "What telemetry proves the user-visible behavior happened?"
    evidence: "metric, log, trace, or event name"
  - id: Q023
    persona_id: charity-majors-method
    question: "Which high-cardinality fields are needed to debug one weird user, repo, model, or request?"
