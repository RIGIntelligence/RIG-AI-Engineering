version: 1
updated_utc: "2026-05-28T00:58:00Z"
purpose: "The 100-question RIG intake and review bank. Full RIG product-build, harness-build, or agent-build work should ask all applicable questions or mark them N/A with evidence."

usage:
  full_flow: "Ask all 100 questions, or mark a question N/A with a short reason and evidence path."
  fast_flow: "For narrow work, ask the relevant persona subset and log skipped personas as out of scope."
  proof_rule: "Every answer should produce or cite inspectable evidence: file path, test, log, decision note, issue, runbook, or ProofPacket."

questions:
  - id: Q001
    persona_id: kent-beck-method
    question: "What behavior must change, in one sentence a test could prove?"
    evidence: "failing test, repro, or acceptance criterion"
  - id: Q002
    persona_id: kent-beck-method
    question: "What is the smallest test that should fail before implementation starts?"
    evidence: "test name and command"
  - id: Q003
    persona_id: kent-beck-method
    question: "What fixture or example captures the common path without hiding the edge case?"
    evidence: "fixture path or sample input"
  - id: Q004
    persona_id: kent-beck-method
    question: "What is the simplest implementation that could make the first test pass?"
    evidence: "implementation note or changed file"
  - id: Q005
    persona_id: kent-beck-method
    question: "What design pressure appears after the second or third test?"
    evidence: "duplication, naming, or coupling note"
  - id: Q006
    persona_id: kent-beck-method
    question: "What can be removed, deferred, or hard-coded until evidence says otherwise?"
    evidence: "scope cut list"
  - id: Q007
    persona_id: kent-beck-method
    question: "What regression would embarrass us if this shipped?"
    evidence: "negative test or risk note"
  - id: Q008
    persona_id: kent-beck-method
    question: "What acceptance test does the user actually care about?"
    evidence: "acceptance test, screenshot, API result, or CLI output"
  - id: Q009
    persona_id: kent-beck-method
    question: "What refactor is now safe because tests cover behavior?"
    evidence: "before/after design note"
  - id: Q010
    persona_id: kent-beck-method
    question: "What command proves the red-green-refactor loop completed?"
    evidence: "terminal command and result"

  - id: Q011
    persona_id: martin-fowler-method
    question: "What module owns this behavior today, and is that still the right boundary?"
    evidence: "file path and ownership note"
  - id: Q012
    persona_id: martin-fowler-method
    question: "What is the smallest refactoring step that improves the design without changing behavior?"
    evidence: "refactoring plan"
  - id: Q013
    persona_id: martin-fowler-method
    question: "Which dependency direction matters most, and is it currently pointing the right way?"
    evidence: "call graph, import list, or architecture note"
  - id: Q014
    persona_id: martin-fowler-method
    question: "What duplication is intentional domain language, and what duplication is accidental?"
    evidence: "examples and decision"
  - id: Q015
    persona_id: martin-fowler-method
    question: "What public interface or contract could this change accidentally break?"
    evidence: "API, CLI, schema, or prompt contract"
  - id: Q016
    persona_id: martin-fowler-method
    question: "What name would make the domain concept clearer to the next maintainer?"
    evidence: "rename candidate or glossary note"
  - id: Q017
    persona_id: martin-fowler-method
    question: "What migration path lets old and new behavior coexist safely?"
    evidence: "compatibility plan"
  - id: Q018
    persona_id: martin-fowler-method
    question: "What hidden temporal coupling or ordering assumption exists?"
    evidence: "sequence note or test"
  - id: Q019
    persona_id: martin-fowler-method
    question: "What would make this design cheaper to change next month?"
    evidence: "evolution note"
  - id: Q020
    persona_id: martin-fowler-method
    question: "What architectural decision should be recorded before implementation continues?"
    evidence: "ADR, doc path, or issue"

  - id: Q021
    persona_id: charity-majors-method
